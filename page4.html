<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoSpace — Edit Room</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }
  nav { background: #fff; display: flex; align-items: center; padding: 0 24px; height: 52px; border-bottom: 1px solid #e8eaed; gap: 24px; }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; color: #0d9488; text-decoration: none; }
  .nav-logo .logo-icon { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, #0d9488, #14b8a6); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 13px; }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500; color: #444; cursor: pointer; border: none; background: none; }
  .nav-link.active { background: #f0f2f5; font-weight: 600; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #14b8a6, #0891b2); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
  .sign-out { font-size: 13px; color: #666; cursor: pointer; }

  .edit-page { max-width: 560px; margin: 48px auto; padding: 0 24px 48px; }
  .edit-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  .edit-header { background: #1e2340; color: #fff; padding: 28px 32px; position: relative; }
  .edit-header h2 { font-size: 24px; font-weight: 700; }
  .edit-header p { font-size: 14px; color: #aaa; margin-top: 4px; }
  .edit-pencil { position: absolute; right: 28px; top: 50%; transform: translateY(-50%); font-size: 28px; }
  .edit-body { padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: #444; text-transform: uppercase; margin-bottom: 8px; }
  .field-input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1a1a2e; outline: none; }
  .field-input:focus { border-color: #0d9488; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-icon-wrap { position: relative; }
  .field-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 14px; }
  .field-input.has-icon { padding-left: 34px; }
  .preview-box { width: 100%; height: 100px; border: 1.5px dashed #d1d5db; border-radius: 10px; background: #f9fafb; }
  .edit-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .btn-cancel { padding: 11px 24px; border-radius: 10px; border: 1.5px solid #d1d5db; background: #fff; font-size: 14px; font-weight: 600; color: #555; cursor: pointer; }
  .btn-update { padding: 11px 28px; border-radius: 10px; border: none; background: #0d9488; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="#"><div class="logo-icon">CS</div>CoSpace</a>
  <div class="nav-links">
    <button class="nav-link active">Spaces</button>
    <button class="nav-link">My Booking</button>
  </div>
  <div class="nav-right">
    <div class="avatar">AD</div>
    <span style="font-size:13px;color:#444;font-weight:500;">admin</span>
    <span class="sign-out">Sign out</span>
  </div>
</nav>

<div class="edit-page">
  <div class="edit-card">
    <div class="edit-header">
      <h2>Edit Room</h2>
      <p>Update the details for this room</p>
      <div class="edit-pencil">✏️</div>
    </div>
    <div class="edit-body">
      <div>
        <div class="field-label">Room Name</div>
        <input class="field-input" type="text" value="Meeting Room M">
      </div>
      <div class="field-row">
        <div>
          <div class="field-label">Capacity</div>
          <div class="field-icon-wrap">
            <span class="field-icon">👥</span>
            <input class="field-input has-icon" type="number" value="20">
          </div>
        </div>
        <div>
          <div class="field-label">Price / Hr (฿)</div>
          <div class="field-icon-wrap">
            <span class="field-icon">฿</span>
            <input class="field-input has-icon" type="number" value="200">
          </div>
        </div>
      </div>
      <div>
        <div class="field-label">Image URL</div>
        <input class="field-input" type="text" value="https://drive.google.com/file/d/1O2JCgrAGXNLfEy257AUkWEw-LxL">
      </div>
      <div>
        <div class="field-label">Preview</div>
        <div class="preview-box"></div>
      </div>
      <div class="edit-actions">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-update">Update Room</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
